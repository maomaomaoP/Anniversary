<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Final Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Jost', sans-serif;
    background: linear-gradient(160deg, #2a1500 0%, #5a3000 40%, #8a5010 100%);
    min-height: 100svh;
    color: white;
  }
 
  .page-header {
    text-align: center;
    padding: 1.25rem 1rem 1rem;
    background: rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,200,80,0.2);
  }
 
  .stop-label {
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 0.3rem;
  }
 
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: #f0c060;
  }
 
  .instructions {
    text-align: center;
    padding: 0.75rem 1.5rem 0.75rem;
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    opacity: 0.9;
    color: #f0c060;
  }
 
  /* ── PUZZLE ── */
  .puzzle-wrap {
    display: flex;
    justify-content: center;
    padding: 0.5rem 1rem 1rem;
  }
 
  .puzzle-container {
    position: relative;
    width: min(92vw, 400px);
  }
 
  .puzzle-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 3px;
    width: 100%;
    aspect-ratio: 4/6;
    background: rgba(255,200,80,0.15);
    border: 2px solid rgba(255,200,80,0.3);
    border-radius: 6px;
    overflow: hidden;
    padding: 3px;
  }
 
  .tile {
    position: relative;
    overflow: hidden;
    border-radius: 3px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    border: 1px solid rgba(255,200,80,0.2);
  }
 
  .tile:hover {
    transform: scale(0.97);
    box-shadow: 0 0 0 2px rgba(255,200,80,0.5);
  }
 
  .tile.empty {
    background: rgba(0,0,0,0.4);
    cursor: default;
    border: 1px solid rgba(255,200,80,0.1);
  }
 
  .tile.empty:hover {
    transform: none;
    box-shadow: none;
  }
 
  .tile img {
    position: absolute;
    display: block;
    /* size and position set by JS */
  }
 
  .tile.sliding {
    transition: transform 0.18s ease;
  }
 
  /* ── MOVE COUNTER ── */
  .move-counter {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    opacity: 0.6;
    padding: 0.4rem 0 0.75rem;
    color: #f0c060;
  }
 
  .btn-reset {
    display: block;
    margin: 0 auto 1.5rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 0.6rem 1.8rem;
    border-radius: 100px;
    border: 1px solid rgba(255,200,80,0.4);
    background: transparent;
    color: #f0c060;
    cursor: pointer;
  }
 
  /* ── WIN OVERLAY ── */
  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,21,0,0.95);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 2rem;
    overflow-y: auto;
  }
 
  .win-overlay.show { display: flex; }
 
  .win-photo {
    width: min(80vw, 260px);
    border: 4px solid rgba(255,200,80,0.6);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
 
  .win-photo img {
    width: 100%;
    display: block;
    aspect-ratio: 4/6;
    object-fit: cover;
    object-position: center;
  }
 
  .win-emoji { font-size: 2.5rem; margin-bottom: 1rem; }
 
  .win-text h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: #f0c060;
    margin-bottom: 0.75rem;
  }
 
  .win-text p {
    font-family: 'Caveat', cursive;
    font-size: 1.35rem;
    color: rgba(255,255,255,0.9);
    max-width: 320px;
    line-height: 1.6;
  }
</style>
</head>
<body>
 
<header class="page-header">
  <p class="stop-label">Final Challenge</p>
  <h1 class="page-title">Sliding Puzzle</h1>
</header>
 
<p class="instructions">Slide the pieces to reveal the picture!</p>
 
<div class="puzzle-wrap">
  <div class="puzzle-container">
    <div class="puzzle-grid" id="grid"></div>
  </div>
</div>
 
<p class="move-counter" id="moveCounter">0 moves</p>
<button class="btn-reset" onclick="initPuzzle()">Restart</button>
 
<div class="win-overlay" id="winOverlay">
  <div class="win-emoji">🎉</div>
  <div class="win-photo">
    <img src="../images/river.jpeg" alt="Us">
  </div>
  <div class="win-text">
    <h2>Congrats!</h2>
    <p>You completed the challenge, now it's time to get dressed up and go for a fancy meal! But one more thing first...</p>
  </div>
</div>
 
<script>
  const COLS = 3, ROWS = 4;
  const TOTAL = COLS * ROWS;
  const EMPTY = TOTAL - 1;
 
  let tiles = [];
  let moves = 0;
 
  function initPuzzle() {
    moves = 0;
    updateMoves();
    document.getElementById('winOverlay').classList.remove('show');
 
    // Create solved order, then shuffle
    tiles = Array.from({length: TOTAL}, (_, i) => i);
    shuffle();
    render();
  }
 
  function shuffle() {
    // Perform many random valid moves from solved state to ensure solvability
    let emptyIdx = EMPTY;
    for (let i = 0; i < 500; i++) {
      const neighbours = getNeighbours(emptyIdx);
      const pick = neighbours[Math.floor(Math.random() * neighbours.length)];
      [tiles[emptyIdx], tiles[pick]] = [tiles[pick], tiles[emptyIdx]];
      emptyIdx = pick;
    }
  }
 
  function getNeighbours(idx) {
    const neighbours = [];
    const row = Math.floor(idx / COLS), col = idx % COLS;
    if (row > 0) neighbours.push(idx - COLS);
    if (row < ROWS - 1) neighbours.push(idx + COLS);
    if (col > 0) neighbours.push(idx - 1);
    if (col < COLS - 1) neighbours.push(idx + 1);
    return neighbours;
  }
 
  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
 
    // Get rendered tile size
    const gridRect = grid.getBoundingClientRect();
    const tileW = (gridRect.width - (COLS + 1) * 3) / COLS;
    const tileH = (gridRect.height - (ROWS + 1) * 3) / ROWS;
    const imgW = tileW * COLS + (COLS - 1) * 3;
    const imgH = tileH * ROWS + (ROWS - 1) * 3;
 
    tiles.forEach((tileVal, pos) => {
      const tile = document.createElement('div');
      tile.className = 'tile' + (tileVal === EMPTY ? ' empty' : '');
 
      if (tileVal !== EMPTY) {
        const img = document.createElement('img');
        img.src = '../images/river.jpeg';
 
        const srcCol = tileVal % COLS;
        const srcRow = Math.floor(tileVal / COLS);
 
        img.style.width = imgW + 'px';
        img.style.height = imgH + 'px';
        img.style.left = -(srcCol * (tileW + 3)) + 'px';
        img.style.top = -(srcRow * (tileH + 3)) + 'px';
 
        tile.appendChild(img);
        tile.addEventListener('click', () => handleClick(pos));
      }
 
      grid.appendChild(tile);
    });
  }
 
  function handleClick(pos) {
    const emptyPos = tiles.indexOf(EMPTY);
    const neighbours = getNeighbours(emptyPos);
 
    if (neighbours.includes(pos)) {
      [tiles[emptyPos], tiles[pos]] = [tiles[pos], tiles[emptyPos]];
      moves++;
      updateMoves();
      render();
 
      if (isSolved()) {
        setTimeout(() => document.getElementById('winOverlay').classList.add('show'), 500);
      }
    }
  }
 
  function isSolved() {
    return tiles.every((val, idx) => val === idx);
  }
 
  function updateMoves() {
    document.getElementById('moveCounter').textContent = `${moves} move${moves !== 1 ? 's' : ''}`;
  }
 
  // Wait for layout before rendering so tile sizes are correct
  window.addEventListener('load', initPuzzle);
</script>
</body>
</html>
